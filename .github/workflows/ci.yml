name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

# Cancel in-progress runs for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }}, py3.14)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install project (all extras)
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest -q

  eval:
    name: eval (offline, ubuntu, py3.14)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install project (core + eval tests)
        run: uv sync

      - name: Run eval test-suite (offline, sin red)
        run: uv run pytest tests/eval tests/test_mock_provider.py tests/cli/test_evaluate.py -q

      - name: CLI smoke — ciel evaluate run (MockProvider)
        run: uv run ciel evaluate run --dataset tests/eval/smoke.yaml --provider mock --threshold 0.0

  reflect:
    name: reflect (offline, ubuntu, py3.14)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install project (core + reflect tests)
        run: uv sync

      - name: Run reflect test-suite (offline, sin red)
        run: uv run pytest tests/test_prompt_versioning.py tests/test_reflection.py tests/test_cognitive_state.py tests/cli/test_reflect.py -q

      - name: CLI smoke — ciel reflect run (MockProvider)
        run: uv run ciel reflect run --dataset tests/eval/smoke.yaml --provider mock --threshold 0.0
