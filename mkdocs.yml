site_name: Ciel Agent Framework — Documentación oficial
site_description: Framework enterprise de agentes autónomos, multi-tenant y model/deploy-agnostic. Documentación oficial de mana-ciel (import ciel).
site_url: https://ander-labs.github.io/ciel-agent-framework/
repo_url: https://github.com/Ander-Labs/ciel-agent-framework
repo_name: Ander-Labs/ciel-agent-framework
edit_uri: edit/master/docs/

# Excluir del build la documentación INTERNA de ingeniería (diario de
# desarrollo, prompts de orquestación, notas de charteo/CI) para que no
# aparezca en el sitio público ni genere warnings con `mkdocs build --strict`.
# IMPORTANTE: mkdocs 1.6 usa sintaxis gitwildmatch (pathspec), NO regex.
# Rutas relativas a docs/ (sin prefijo docs/).
exclude_docs: |
  dev/
  Prompt.md
  CHARTER.md
  CI.md
  UPGRADE*.md

theme:
  name: material
  language: es
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - toc.follow
    - toc.integrate
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
    - search.share
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Cambiar a modo claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo oscuro

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            docstring_style: google
            show_root_heading: true
            show_root_toc_entry: false
            show_bases: true
            show_signature_annotations: true
            setup_commands:
              - "import sys; sys.path.append('src')"
              - "import ciel"

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      permalink_leading: true
      toc_depth: 3

nav:
  - Inicio: index.md
  - Roadmap: roadmap.md
  - Guía:
      - Inicio rápido: guide/quickstart.md
      - Conceptos: guide/concepts.md
      - Tools: guide/tools.md
      - Providers: guide/providers.md
      - Plugins: guide/plugins.md
      - Tutorial de plugin: guide/tutorial_plugin.md
      - Despliegue: guide/deploy.md
      - Configuración: guide/configuration.md
  - Cookbook:
      - Índice: cookbook/index.md
      - Múltiples tools: cookbook/multi_tool.md
      - Multitenancy con Context: cookbook/context_tenant.md
      - Tools asíncronas: cookbook/async_tool.md
      - Instrucciones de sistema: cookbook/system_instructions.md
      - Provider real: cookbook/real_provider.md
  - Arquitectura:
      - Multi-tenancy: design/multi_tenancy.md
  - Runbooks (ops):
      - Despliegue: runbooks/deploy.md
      - Incidentes: runbooks/incident.md
      - Rollback: runbooks/rollback.md
      - Backup: runbooks/backup.md
      - HPA (autoescalado): runbooks/hpa.md
  - Upgrade: upgrade.md
  - Referencia API:
      - Índice: api-reference/index.md
      - CLI: api-reference/cli.md
      - Observability: api-reference/observability.md
      - Adapters: api-reference/adapters.md
      - Gateway: api-reference/gateway.md
      - Providers: api-reference/providers.md
      - Runtime: api-reference/runtime.md
      - Security: api-reference/security.md
      - Orchestration: api-reference/orchestration.md
  - SDK: sdk/README.md
