site_name: Ciel Agent Framework — Guía
site_description: Guía para desarrolladores del framework Ciel (mana-ciel)
theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      toggle:
        icon: material/weather-night
        name: Modo claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      toggle:
        icon: material/weather-sunny
        name: Modo oscuro
nav:
  - Inicio: index.md
  - Quickstart: quickstart.md
  - Conceptos: concepts.md
  - Providers: providers.md
  - Tools: tools.md
  - Plugins: plugins.md
  - Deploy: deploy.md
  - Configuración: configuration.md
markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
